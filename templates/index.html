<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통계청 생활인구 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: rgba(255,255,255,0.07);
    --accent: #4f8ef7;
    --accent2: #f75f8e;
    --accent3: #4fc98e;
    --text: #e8eaf0;
    --text2: #7c84a0;
    --text3: #4a5070;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 1.2rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--surface);
  }

  header .logo {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid var(--accent);
    padding: 3px 8px;
    border-radius: 3px;
  }

  header h1 { font-size: 15px; font-weight: 500; color: var(--text); }

  header .badge {
    margin-left: auto;
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 57px);
  }

  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 1.5rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .sidebar-section label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    display: block;
    margin-bottom: 10px;
    font-family: 'DM Mono', monospace;
  }

  .type-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: 1px solid transparent;
    color: var(--text2);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    padding: 9px 12px;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 4px;
    transition: all 0.15s;
  }

  .type-btn:hover { background: var(--surface2); color: var(--text); }
  .type-btn.active {
    background: rgba(79,142,247,0.12);
    border-color: rgba(79,142,247,0.4);
    color: var(--accent);
  }

  .period-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .period-grid select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    padding: 7px 8px;
    border-radius: 6px;
    width: 100%;
    outline: none;
    cursor: pointer;
  }

  .period-grid select:focus { border-color: var(--accent); }

  .fetch-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 11px;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.15s;
    margin-top: auto;
  }

  .fetch-btn:hover { opacity: 0.85; }
  .fetch-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .main { padding: 1.5rem 2rem; overflow-y: auto; }

  .metric-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.2rem;
  }

  .metric-card .m-label {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    font-family: 'DM Mono', monospace;
  }

  .metric-card .m-value {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1;
  }

  .metric-card .m-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

  .chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem;
  }

  .chart-card.full { grid-column: 1 / -1; }

  .chart-card .c-title {
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 0.5px;
    margin-bottom: 14px;
    font-family: 'DM Mono', monospace;
  }

  .chart-wrap { position: relative; width: 100%; }

  .state-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 2rem;
    color: var(--text3);
    font-size: 13px;
    gap: 8px;
  }

  .state-box .icon { font-size: 32px; opacity: 0.4; }

  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(247,95,142,0.1);
    border: 1px solid rgba(247,95,142,0.3);
    border-radius: 8px;
    padding: 1rem 1.2rem;
    font-size: 13px;
    color: var(--accent2);
    margin-bottom: 1rem;
  }

  .legend-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 10px;
    font-size: 12px;
    color: var(--text2);
  }

  .legend-row span { display: flex; align-items: center; gap: 5px; }
  .ld { width: 10px; height: 10px; border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">KOSTAT</div>
  <h1>생활인구 대시보드</h1>
  <div class="badge">통계청 나우캐스트</div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <label>데이터 유형</label>
      <button class="type-btn active" data-type="living_gender">시군구별 생활인구 · 성별</button>
      <button class="type-btn" data-type="living_age">시군구별 생활인구 · 연령별</button>
      <button class="type-btn" data-type="staying_resident">체류인구 · 내외국인</button>
      <button class="type-btn" data-type="staying_gender">체류인구 · 성별</button>
      <button class="type-btn" data-type="staying_age">체류인구 · 연령별</button>
    </div>

    <div class="sidebar-section">
      <label>조회 기간</label>
      <div class="period-grid">
        <select id="fromPeriod"></select>
        <select id="toPeriod"></select>
      </div>
    </div>

    <button class="fetch-btn" id="fetchBtn" onclick="fetchData()">조회하기</button>
  </aside>

  <main class="main" id="mainArea">
    <div class="state-box">
      <div class="icon">📊</div>
      <div>데이터 유형과 기간을 선택 후 조회하세요</div>
    </div>
  </main>
</div>

<script>
// ─── 실제 API 키 패턴 (디버그로 확인된 값) ──────────────────────────────────
// m{yyyyMM}AgettPcnt  → 합계
// m{yyyyMM}Age19Pcnt  → 남성(gender) / 20세미만(age)
// m{yyyyMM}Age20Pcnt  → 여성(gender) / 20대(age)
// m{yyyyMM}Age30Pcnt  → 30대
// m{yyyyMM}Age40Pcnt  → 40대
// m{yyyyMM}Age50Pcnt  → 50대
// m{yyyyMM}Age60Pcnt  → 60세이상
// m{yyyyMM}DomPcnt    → 내국인 (resident)
// m{yyyyMM}For_Pcnt   → 외국인 (resident) ※ 실제 키 확인 필요

// ─── Period dropdowns ───────────────────────────────────────────────────────
const periods = [];
const now = new Date();
for (let i = 18; i >= 0; i--) {
  const d = new Date(now.getFullYear(), now.getMonth() - 3 - i, 1);
  const ym = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}`;
  periods.push(ym);
}

const fmt = p => `${p.slice(0,4)}.${p.slice(4)}`;
const fromSel = document.getElementById('fromPeriod');
const toSel   = document.getElementById('toPeriod');
periods.forEach((p, i) => {
  fromSel.innerHTML += `<option value="${p}" ${i===periods.length-4?'selected':''}>${fmt(p)}</option>`;
  toSel.innerHTML   += `<option value="${p}" ${i===periods.length-1?'selected':''}>${fmt(p)}</option>`;
});

// ─── Type buttons ────────────────────────────────────────────────────────────
let currentType = 'living_gender';
document.querySelectorAll('.type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentType = btn.dataset.type;
  });
});

// ─── Chart instances ─────────────────────────────────────────────────────────
let charts = {};
function destroyCharts() {
  Object.values(charts).forEach(c => c && c.destroy());
  charts = {};
}

const COLORS = ['#4f8ef7','#f75f8e','#4fc98e','#f7b84f','#a78bfa','#38bdf8','#fb923c','#34d399'];

// ─── 시도명 축약 ──────────────────────────────────────────────────────────────
const SIDO_SHORT = nm => nm
  .replace('광역시','').replace('특별시','')
  .replace('특별자치시','').replace('특별자치도','')
  .replace('도','').replace('시','').trim();

// ─── 실제 키 빌더 (디버그 결과 기반) ────────────────────────────────────────
function buildKeys(period, type) {
  const p = `m${period}`;
  if (type.includes('gender')) {
    return {
      tot: `${p}AgettPcnt`,
      sub1: `${p}Age19Pcnt`,   // 남성
      sub2: `${p}Age20Pcnt`,   // 여성
    };
  } else if (type.includes('age')) {
    return {
      tot:  `${p}AgettPcnt`,
      age19:`${p}Age19Pcnt`,   // 20세미만
      age20:`${p}Age20Pcnt`,   // 20대
      age30:`${p}Age30Pcnt`,   // 30대
      age40:`${p}Age40Pcnt`,   // 40대
      age50:`${p}Age50Pcnt`,   // 50대
      age60:`${p}Age60Pcnt`,   // 60세이상
    };
  } else if (type.includes('resident')) {
    return {
      tot:  `${p}AgettPcnt`,
      sub1: `${p}DomPcnt`,     // 내국인
      sub2: `${p}For_Pcnt`,    // 외국인 (실제 키는 staying_resident 조회 후 확인)
    };
  }
  return { tot: `${p}AgettPcnt` };
}

// ─── Fetch ───────────────────────────────────────────────────────────────────
async function fetchData() {
  const btn  = document.getElementById('fetchBtn');
  const main = document.getElementById('mainArea');

  const from = fromSel.value, to = toSel.value;
  const lo = from < to ? from : to;
  const hi = from < to ? to   : from;
  const allP = periods.filter(p => p >= lo && p <= hi);

  btn.disabled = true;
  btn.textContent = '불러오는 중...';
  main.innerHTML = `<div class="state-box"><div class="spinner"></div><div>데이터 조회 중...</div></div>`;
  destroyCharts();

  try {
    const res  = await fetch('/api/fetch', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ type: currentType, periods: allP })
    });
    const rows = await res.json();

    if (!Array.isArray(rows) || rows.length === 0)
      throw new Error('데이터가 없습니다. 기간을 조정해 보세요.');

    // 콘솔에 첫 row 키 출력 (디버그용)
    console.log('[키 확인]', Object.keys(rows[0]));
    console.log('[샘플]', rows[0]);

    renderDashboard(rows, allP, currentType);
  } catch(e) {
    main.innerHTML = `<div class="error-msg">⚠ ${e.message || '데이터 로드 실패'}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '조회하기';
  }
}

// ─── Render ──────────────────────────────────────────────────────────────────
function renderDashboard(rows, allP, type) {
  const main     = document.getElementById('mainArea');
  const latestP  = allP[allP.length - 1];
  const keys     = buildKeys(latestP, type);
  const isGender = type.includes('gender');
  const isAge    = type.includes('age');
  const isRes    = type.includes('resident');

  // ── 시도별 집계 ────────────────────────────────────────────────────────────
  // populTypeNm === '계' 인 row만 사용 (중복 집계 방지)
  const baseRows = rows.filter(r => r.populTypeNm === '계' || r.populTypeCd === '002000');

  const sidoMap = {};
  baseRows.forEach(row => {
    const sido = SIDO_SHORT(row.agencyNm || '');
    if (!sido) return;
    if (!sidoMap[sido]) sidoMap[sido] = { tot: 0, subs: {} };

    const tot = parseInt(row[keys.tot] || 0);
    sidoMap[sido].tot += tot;

    // 서브 키들 합산
    Object.entries(keys).forEach(([k, colName]) => {
      if (k === 'tot') return;
      sidoMap[sido].subs[k] = (sidoMap[sido].subs[k] || 0) + parseInt(row[colName] || 0);
    });
  });

  const sidos  = Object.entries(sidoMap).sort((a,b) => b[1].tot - a[1].tot);
  const labels = sidos.map(([k]) => k);
  const natTot = sidos.reduce((s,[,v]) => s + v.tot, 0);

  // ── 메트릭 카드 ────────────────────────────────────────────────────────────
  let metricsHTML = `<div class="metric-row">
    <div class="metric-card">
      <div class="m-label">전국 합계</div>
      <div class="m-value" style="color:var(--accent)">${(natTot/1e4).toFixed(0)}<span style="font-size:14px;font-weight:400;margin-left:4px">만</span></div>
      <div class="m-sub">${latestP.slice(0,4)}년 ${parseInt(latestP.slice(4))}월 기준</div>
    </div>`;

  if (isGender) {
    const natSub1 = sidos.reduce((s,[,v]) => s + (v.subs.sub1||0), 0);
    const natSub2 = sidos.reduce((s,[,v]) => s + (v.subs.sub2||0), 0);
    metricsHTML += `
    <div class="metric-card">
      <div class="m-label">남성</div>
      <div class="m-value" style="color:#4f8ef7">${(natSub1/1e4).toFixed(0)}<span style="font-size:14px;font-weight:400;margin-left:4px">만</span></div>
      <div class="m-sub">${natTot>0?(natSub1/natTot*100).toFixed(1):'-'}%</div>
    </div>
    <div class="metric-card">
      <div class="m-label">여성</div>
      <div class="m-value" style="color:#f75f8e">${(natSub2/1e4).toFixed(0)}<span style="font-size:14px;font-weight:400;margin-left:4px">만</span></div>
      <div class="m-sub">${natTot>0?(natSub2/natTot*100).toFixed(1):'-'}%</div>
    </div>`;
  } else if (isRes) {
    const natSub1 = sidos.reduce((s,[,v]) => s + (v.subs.sub1||0), 0);
    const natSub2 = sidos.reduce((s,[,v]) => s + (v.subs.sub2||0), 0);
    metricsHTML += `
    <div class="metric-card">
      <div class="m-label">내국인</div>
      <div class="m-value" style="color:#4fc98e">${(natSub1/1e4).toFixed(0)}<span style="font-size:14px;font-weight:400;margin-left:4px">만</span></div>
      <div class="m-sub">${natTot>0?(natSub1/natTot*100).toFixed(1):'-'}%</div>
    </div>
    <div class="metric-card">
      <div class="m-label">외국인</div>
      <div class="m-value" style="color:#f7b84f">${(natSub2/1e4).toFixed(0)}<span style="font-size:14px;font-weight:400;margin-left:4px">만</span></div>
      <div class="m-sub">${natTot>0?(natSub2/natTot*100).toFixed(1):'-'}%</div>
    </div>`;
  }

  metricsHTML += `</div>`;

  // ── 차트 HTML ──────────────────────────────────────────────────────────────
  main.innerHTML = metricsHTML + `
  <div class="chart-grid">
    <div class="chart-card full">
      <div class="c-title">시도별 생활인구 (${latestP.slice(0,4)}.${parseInt(latestP.slice(4))}월 기준)</div>
      <div class="legend-row" id="legendBar"></div>
      <div class="chart-wrap" style="height:280px"><canvas id="barChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="c-title">구성 비율 (전국)</div>
      <div class="chart-wrap" style="height:230px"><canvas id="pieChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="c-title">시도별 세부 비율</div>
      <div class="chart-wrap" style="height:230px"><canvas id="ratioChart"></canvas></div>
    </div>
  </div>`;

  const chartBaseOpts = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color:'#7c84a0', font:{size:11} }, grid:{color:'rgba(255,255,255,0.04)'} },
      y: { ticks: { color:'#7c84a0', callback: v => (v/1e4).toFixed(0)+'만' }, grid:{color:'rgba(255,255,255,0.06)'} }
    }
  };

  let barDatasets = [], legendHTML = '', pieData = [], pieLabels = [];

  if (isGender) {
    const v1 = sidos.map(([,v]) => Math.round((v.subs.sub1||0)));
    const v2 = sidos.map(([,v]) => Math.round((v.subs.sub2||0)));
    barDatasets = [
      { label:'남성', data: v1, backgroundColor:'#4f8ef7', borderRadius:4 },
      { label:'여성', data: v2, backgroundColor:'#f75f8e', borderRadius:4 },
    ];
    legendHTML = `<span><span class="ld" style="background:#4f8ef7"></span>남성</span><span><span class="ld" style="background:#f75f8e"></span>여성</span>`;
    pieData   = [sidos.reduce((s,[,v])=>s+(v.subs.sub1||0),0), sidos.reduce((s,[,v])=>s+(v.subs.sub2||0),0)];
    pieLabels = ['남성','여성'];

  } else if (isAge) {
    const ageDefs = [
      { key:'age19', label:'20세미만', color: COLORS[0] },
      { key:'age20', label:'20대',     color: COLORS[1] },
      { key:'age30', label:'30대',     color: COLORS[2] },
      { key:'age40', label:'40대',     color: COLORS[3] },
      { key:'age50', label:'50대',     color: COLORS[4] },
      { key:'age60', label:'60세이상', color: COLORS[5] },
    ];
    ageDefs.forEach(({ key, label, color }) => {
      barDatasets.push({
        label, borderRadius: 3,
        data: sidos.map(([,v]) => v.subs[key]||0),
        backgroundColor: color,
      });
      legendHTML += `<span><span class="ld" style="background:${color}"></span>${label}</span>`;
      pieData.push(sidos.reduce((s,[,v]) => s+(v.subs[key]||0), 0));
      pieLabels.push(label);
    });

  } else if (isRes) {
    const v1 = sidos.map(([,v]) => v.subs.sub1||0);
    const v2 = sidos.map(([,v]) => v.subs.sub2||0);
    barDatasets = [
      { label:'내국인', data: v1, backgroundColor:'#4fc98e', borderRadius:4 },
      { label:'외국인', data: v2, backgroundColor:'#f7b84f', borderRadius:4 },
    ];
    legendHTML = `<span><span class="ld" style="background:#4fc98e"></span>내국인</span><span><span class="ld" style="background:#f7b84f"></span>외국인</span>`;
    pieData   = [sidos.reduce((s,[,v])=>s+(v.subs.sub1||0),0), sidos.reduce((s,[,v])=>s+(v.subs.sub2||0),0)];
    pieLabels = ['내국인','외국인'];
  }

  document.getElementById('legendBar').innerHTML = legendHTML;

  // ── 막대 차트 ──────────────────────────────────────────────────────────────
  charts.bar = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: { labels, datasets: barDatasets },
    options: chartBaseOpts,
  });

  // ── 도넛 차트 ─────────────────────────────────────────────────────────────
  charts.pie = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: {
      labels: pieLabels,
      datasets: [{ data: pieData, backgroundColor: COLORS.slice(0, pieData.length), borderWidth:0, hoverOffset:6 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position:'bottom', labels:{ color:'#7c84a0', font:{size:11}, boxWidth:10 } } }
    }
  });

  // ── 수평 비율 차트 ────────────────────────────────────────────────────────
  const ratioDatasets = barDatasets.map(ds => ({
    ...ds,
    data: sidos.map(([,v], i) => {
      const tot = v.tot || 1;
      return parseFloat((ds.data[i] / tot * 100).toFixed(1));
    })
  }));

  charts.ratio = new Chart(document.getElementById('ratioChart'), {
    type: 'bar',
    data: { labels, datasets: ratioDatasets },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { stacked:true, max:100, ticks:{ color:'#7c84a0', callback: v=>v+'%' }, grid:{color:'rgba(255,255,255,0.06)'} },
        y: { stacked:true, ticks:{ color:'#7c84a0', font:{size:10} }, grid:{display:false} }
      }
    }
  });
}
</script>
</body>
</html>
